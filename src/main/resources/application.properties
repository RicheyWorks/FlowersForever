# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080

# ── Actuator ──────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.flowerfarm=INFO

# ── Persistence (file H2 — survives restarts; portable with the app) ──────────
# Database file: ./data/flowerfarm.mv.db
spring.datasource.url=jdbc:h2:file:./data/flowerfarm;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.h2.console.enabled=false

# Optional CSV used only when the database is empty on first start
flowerfarm.inventory.seed-csv=farm_inventory.csv

# ── Shared barn PC auth (off by default; use profile "auth" to enable) ────────
# Roles: OWNER (full), HAND (ops write), VIEWER (read-only REST)
# Format: user:pass:ROLE,user2:pass2:ROLE
flowerfarm.auth.enabled=false
flowerfarm.auth.users=farm:kitsap:OWNER,hand:harvest:HAND,viewer:view:VIEWER
# Fallback single user when users list empty:
flowerfarm.auth.username=farm
flowerfarm.auth.password=kitsap

# ══════════════════════════════════════════════════════════════════════════════
# CONNECTOR CONFIGURATION
# Fill in credentials here (or override in application-local.properties which
# is .gitignored).  Leave blank to disable a connector — each connector guards
# its own isAvailable() check.
# ══════════════════════════════════════════════════════════════════════════════

# ── CSV ───────────────────────────────────────────────────────────────────────
connector.csv.import-file=farm_inventory.csv
connector.csv.export-file=exported_inventory.csv
connector.csv.delimiter=,
connector.csv.col.name=Name
connector.csv.col.category=Category
connector.csv.col.price=Price
connector.csv.col.unit=Unit
connector.csv.col.cost=Cost
connector.csv.col.quantity=Quantity
connector.csv.col.notes=Notes

# ── Excel ─────────────────────────────────────────────────────────────────────
connector.excel.file=flower_inventory.xlsx

# ── Airtable ──────────────────────────────────────────────────────────────────
# Dual mode: local-file for offline demos, or api-key + base-id for live Airtable
connector.airtable.local-file=data/airtable-mirror.json
connector.airtable.api-key=
connector.airtable.base-id=
connector.airtable.table-name=Table 1

# ── Webhook (local dry-run file OR HTTP POST) ─────────────────────────────────
# Local file writes the outbound JSON payload for demos/CI (no network).
# Clear local-file and set url for live delivery. Optional HMAC secret.
connector.webhook.local-file=data/webhook-last-payload.json
connector.webhook.url=
connector.webhook.secret=

# ── Shopify (local JSON mirror OR Admin REST) ─────────────────────────────────
# Local mirror enables offline import/export/sync without Admin API credentials.
# Clear local-file and set shop-name + api-token for live REST.
connector.shopify.local-file=data/shopify-mirror.json
connector.shopify.shop-name=
connector.shopify.api-token=
connector.shopify.api-version=2024-01

# ── Square (local JSON mirror OR Catalog + Inventory APIs) ────────────────────
# Local mirror for offline POS demos. Clear local-file and set access-token for live.
connector.square.local-file=data/square-mirror.json
connector.square.access-token=
connector.square.location-id=
connector.square.environment=sandbox
connector.square.currency=USD

# ── Google Sheets (local JSON mirror OR Sheets API) ───────────────────────────
# Local mirror for offline demos. Clear local-file for live Sheets API.
# Live import: spreadsheet-id + api-key (public) OR access-token (private)
# Live export/sync: access-token required (OAuth). API keys are read-only.
connector.google-sheets.local-file=data/google-sheets-mirror.json
connector.google-sheets.spreadsheet-id=
connector.google-sheets.sheet-name=Inventory
connector.google-sheets.api-key=
connector.google-sheets.access-token=
connector.google-sheets.col.name=Name
connector.google-sheets.col.category=Category
connector.google-sheets.col.price=Price
connector.google-sheets.col.unit=Unit
connector.google-sheets.col.cost=Cost
connector.google-sheets.col.quantity=Quantity
connector.google-sheets.col.notes=Notes

# ── Farmbrite (local JSON mirror OR live REST) ────────────────────────────────
# Local mirror enables full offline import/export/sync demos (no credentials).
connector.farmbrite.local-file=data/farmbrite-mirror.json
connector.farmbrite.api-key=
connector.farmbrite.account-id=
connector.farmbrite.base-url=https://www.farmbrite.com/api/v1

# ── Floranext (local JSON mirror OR live REST) ────────────────────────────────
connector.floranext.local-file=data/floranext-mirror.json
connector.floranext.api-key=
connector.floranext.store-url=
