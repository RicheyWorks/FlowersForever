# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080

# ── Actuator ──────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.flowerfarm=INFO

# ══════════════════════════════════════════════════════════════════════════════
# CONNECTOR CONFIGURATION
# Fill in credentials here (or override in application-local.properties which
# is .gitignored).  Leave blank to disable a connector — each connector guards
# its own isAvailable() check.
# ══════════════════════════════════════════════════════════════════════════════

# ── CSV ───────────────────────────────────────────────────────────────────────
connector.csv.import-file=farm_inventory.csv
connector.csv.export-file=exported_inventory.csv
connector.csv.delimiter=,
connector.csv.col.name=Name
connector.csv.col.category=Category
connector.csv.col.price=Price
connector.csv.col.unit=Unit
connector.csv.col.cost=Cost
connector.csv.col.quantity=Quantity
connector.csv.col.notes=Notes

# ── Excel ─────────────────────────────────────────────────────────────────────
connector.excel.file=flower_inventory.xlsx

# ── Airtable ──────────────────────────────────────────────────────────────────
connector.airtable.api-key=
connector.airtable.base-id=
connector.airtable.table-name=Table 1

# ── Webhook ───────────────────────────────────────────────────────────────────
connector.webhook.url=
connector.webhook.secret=

# ── Squarespace ───────────────────────────────────────────────────────────────
connector.squarespace.url=
connector.squarespace.secret=

# ── QuickBooks Online ─────────────────────────────────────────────────────────
connector.quickbooks.client-id=
connector.quickbooks.client-secret=
connector.quickbooks.sandbox=true

# ── Shopify ───────────────────────────────────────────────────────────────────
connector.shopify.shop-name=
connector.shopify.api-token=
connector.shopify.api-version=2024-01

# ── Square ────────────────────────────────────────────────────────────────────
connector.square.access-token=
connector.square.environment=sandbox
connector.square.location-id=

# ── Google Sheets ─────────────────────────────────────────────────────────────
connector.google-sheets.spreadsheet-id=
connector.google-sheets.sheet-name=Inventory
connector.google-sheets.api-key=
connector.google-sheets.credentials-json=
connector.google-sheets.col.name=Name
connector.google-sheets.col.category=Category
connector.google-sheets.col.price=Price
connector.google-sheets.col.unit=Unit
connector.google-sheets.col.cost=Cost
connector.google-sheets.col.quantity=Quantity
connector.google-sheets.col.notes=Notes