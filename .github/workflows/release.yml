# Build and publish the fat JAR + SBOM + GHCR image when a version tag is pushed (ADR-001)
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Build JAR + GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build and test
        run: mvn -B clean verify

      - name: Locate fat JAR
        id: jar
        run: |
          JAR=$(ls target/flowerfarm-manager-*.jar | grep -v '\.original$' | head -n1)
          echo "path=$JAR" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$JAR")" >> "$GITHUB_OUTPUT"
          ls -la "$JAR"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            ${{ steps.jar.outputs.path }}
            target/bom.json
            target/bom.xml
          body: |
            ## FlowersForever ${{ github.ref_name }}

            Runnable fat JAR (Spring Boot + Swing GUI + embedded API on :8080).

            ```bash
            java -jar ${{ steps.jar.outputs.name }}
            # optional barn auth:
            java -jar ${{ steps.jar.outputs.name }} --spring.profiles.active=auth
            ```

            Headless REST-only container:

            ```bash
            docker run -p 8080:8080 ghcr.io/${{ github.repository_owner }}/flowersforever:${{ github.ref_name }}
            ```

            Native installers (MSI / DMG) are attached by the Installers workflow.
            SBOM (CycloneDX `bom.json` / `bom.xml`) attached below.

            See [docs/DEMO.md](docs/DEMO.md) for a walkthrough.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    name: Publish image to GHCR
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/flowersforever
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
