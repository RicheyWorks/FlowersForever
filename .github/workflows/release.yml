# Build and publish the fat JAR when a version tag is pushed (e.g. v1.0.0)
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build JAR + GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build and test
        run: mvn -B clean verify

      - name: Locate fat JAR
        id: jar
        run: |
          JAR=$(ls target/flowerfarm-manager-*.jar | grep -v '\.original$' | head -n1)
          echo "path=$JAR" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$JAR")" >> "$GITHUB_OUTPUT"
          ls -la "$JAR"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: ${{ steps.jar.outputs.path }}
          body: |
            ## FlowersForever ${{ github.ref_name }}

            Runnable fat JAR (Spring Boot + Swing GUI + embedded API on :8080).

            ```bash
            java -jar ${{ steps.jar.outputs.name }}
            # optional barn auth:
            java -jar ${{ steps.jar.outputs.name }} --spring.profiles.active=auth
            ```

            See [docs/DEMO.md](docs/DEMO.md) for a walkthrough.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
