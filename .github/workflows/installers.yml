# Native installers via jpackage — MSI (Windows) + DMG (macOS), attached to the release (ADR-001)
# Note: unsigned — users will see SmartScreen / Gatekeeper warnings. See ADR-001 follow-ups.
name: Installers

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  jpackage:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows MSI
            type: msi
            extra: --win-menu --win-shortcut --win-dir-chooser
          - os: macos-latest
            label: macOS DMG
            type: dmg
            extra: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build fat JAR (tests run in Release workflow)
        run: mvn -B clean package -DskipTests

      - name: Resolve version
        id: ver
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Run jpackage
        shell: bash
        run: |
          JAR=$(basename "$(ls target/flowerfarm-manager-*.jar | grep -v '\.original$' | head -n1)")
          mkdir -p dist
          jpackage \
            --type ${{ matrix.type }} \
            --name FlowersForever \
            --app-version "${{ steps.ver.outputs.version }}" \
            --vendor RicheyWorks \
            --description "Flower Farm Manager - PNW inventory, harvest, CRM" \
            --input target \
            --main-jar "$JAR" \
            --java-options "-Djava.awt.headless=false" \
            --dest dist \
            ${{ matrix.extra }}
          ls dist

      - name: Attach installer to release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
